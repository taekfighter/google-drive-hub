<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>really cool flash game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }
    #flash-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
    }
    ruffle-player {
      width: 100%;
      height: 100%;
      background: black;
      display: block;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.2.0-nightly.2025.10.2/ruffle.min.js"></script>
</head>
<body>
  <div id="flash-container"></div>
  <script>
    const container = document.getElementById("flash-container");

    window.addEventListener("DOMContentLoaded", () => {
      const ruffle = window.RufflePlayer?.newest() || window.RufflePlayer?.createPlayer();
      if (ruffle && container) {
        const player = ruffle.createPlayer();
        player.style.width = "100%";
        player.style.height = "100%";
        player.style.background = "black";
        container.appendChild(player);
        player.load("https://cdn.jsdelivr.net/gh/greeniYT/qwopswf@main/riddleuniversity.swf");
      } else {
        container.textContent = "Ruffle failed to load.";
      }
    });
  </script>
  <param name="movie" value="https://cdn.jsdelivr.net/gh/greeniYT/qwopswf@main/riddleuniversity.swf">
  <embed src="https://cdn.jsdelivr.net/gh/greeniYT/qwopswf@main/riddleuniversity.swf" width="100%" height="100%">
</body>
</html>
