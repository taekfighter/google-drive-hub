<!-- ultimate game stash file -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>Friday Night Funkin'</title>
    <style>
        html, body, #canvas { margin: 0; padding: 0; border: 0; }
        body { color: white; background-color: black; overflow: hidden; touch-action: none; }
        #canvas { display: block; }
        #canvas:focus { outline: none; }
        #status {
            position: absolute; left: 0; right: 0; top: 0; bottom: 0;
            background-color: #000000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; visibility: visible;
        }
        #status-progress { width: 50%; margin-top: 20px; }
        #status-notice {
            display: none; background-color: #5b3943; border-radius: 0.5rem;
            color: #e0e0e0; font-family: sans-serif; padding: 1rem; margin-top: 10px;
        }
    </style>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/shayderrr/newports@6923d8d3c6272e81d2d9d54440d4e2450c47e89b/fnf/index.icon.png" />
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="status">
        <img id="status-splash" src="https://cdn.jsdelivr.net/gh/shayderrr/newports@6923d8d3c6272e81d2d9d54440d4e2450c47e89b/fnf/index.png" style="max-width:80%;">
        <div id="loading-text">Downloading Game Assets (0/23)...</div>
        <progress id="status-progress" value="0" max="100"></progress>
        <div id="status-notice"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/shayderrr/newports@6923d8d3c6272e81d2d9d54440d4e2450c47e89b/fnf/index.js"></script>

    <script>
        const BASE_URL = "https://cdn.jsdelivr.net/gh/shayderrr/newports@6923d8d3c6272e81d2d9d54440d4e2450c47e89b/fnf/";
        const progress = document.getElementById('status-progress');
        const loadText = document.getElementById('loading-text');

        let mergedPckBlob = null;
        let mergedWasmBlob = null;

        async function downloadAndMerge() {
            try {
                const pckChunks = [];
                for (let i = 1; i <= 21; i++) {
                    const part = i.toString().padStart(2, '0');
                    loadText.innerText = `Fetching PCK Part ${i}/21...`;
                    const res = await fetch(`${BASE_URL}index.pck.part${part}`);
                    pckChunks.push(await res.arrayBuffer());
                    progress.value = (i / 23) * 100;
                }
                mergedPckBlob = new Blob(pckChunks, { type: 'application/octet-stream' });

                const wasmChunks = [];
                for (let i = 1; i <= 2; i++) {
                    loadText.innerText = `Fetching WASM Part ${i}/2...`;
                    const res = await fetch(`${BASE_URL}index.wasm.part${i}`);
                    wasmChunks.push(await res.arrayBuffer());
                    progress.value = ((21 + i) / 23) * 100;
                }
                mergedWasmBlob = new Blob(wasmChunks, { type: 'application/wasm' });

                launchEngine();
            } catch (e) {
                document.getElementById('status-notice').style.display = 'block';
                document.getElementById('status-notice').innerText = "Download Error: " + e.message;
            }
        }

        function launchEngine() {
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                const urlStr = typeof url === 'string' ? url : url.url;

                if (urlStr.includes('index.pck')) {
                    return Promise.resolve(new Response(mergedPckBlob));
                }
                if (urlStr.includes('index.wasm')) {
                    return Promise.resolve(new Response(mergedWasmBlob));
                }

                return originalFetch(url, options);
            };

            const GODOT_CONFIG = {
                "args": [],
                "canvasResizePolicy": 2,
                "executable": "index",
                "fileSizes": { "index.pck": mergedPckBlob.size, "index.wasm": mergedWasmBlob.size },
                "focusCanvas": true
            };

            const engine = new Engine(GODOT_CONFIG);
            engine.startGame().then(() => {
                document.getElementById('status').remove();
            });
        }

        downloadAndMerge();
    </script>
</body>
</html>
