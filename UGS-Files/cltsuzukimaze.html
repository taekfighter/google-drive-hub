
<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Unity WebGL Player | Tsuzuki Maze</title>
</head>
<body style="text-align: center; padding: 0; border: 0; margin: 0;">
<canvas id="unity-canvas" width=1080 height=1080 tabindex="-1" style="width: 1080px; height: 1080px; background: #000580"></canvas>
<script src="https://cdn.jsdelivr.net/gh/shayderrr/newports@7d0cd0dec265faa1447187efc1b354d912903942/16470143/Build/WebGL%20Builds.loader.js"></script>
<script>
const canvas = document.querySelector("#unity-canvas");
const buildUrl = "https://cdn.jsdelivr.net/gh/shayderrr/newports@7d0cd0dec265faa1447187efc1b354d912903942/16470143/Build/";
if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);
    canvas.style.width = "100%";
    canvas.style.height = "100%";
    canvas.style.position = "fixed";
    document.body.style.textAlign = "left";
  }

  async function startApp() {
    async function fetchAndMerge(urls) {
      const chunks = await Promise.all(urls.map(url => fetch(url).then(res => {
        if (!res.ok) throw new Error("Failed to load: " + url);
        return res.arrayBuffer();
      })));
      const blob = new Blob(chunks, { type: "application/octet-stream" });
      return URL.createObjectURL(blob);
    }

    const dataUrl = await fetchAndMerge([
      buildUrl + "WebGL%20Builds.data.gz.part1",
      buildUrl + "WebGL%20Builds.data.gz.part2"
    ]);

    const wasmUrl = await fetchAndMerge([
      buildUrl + "WebGL%20Builds.wasm.gz.part1",
      buildUrl + "WebGL%20Builds.wasm.gz.part2"
    ]);

    const frameworkUrl = await fetchAndMerge([
      buildUrl + "WebGL%20Builds.framework.js.gz"
    ]);

    createUnityInstance(canvas, {
      dataUrl: dataUrl,
      frameworkUrl: frameworkUrl,
      codeUrl: wasmUrl,
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Jaxon Cole",
      productName: "Tsuzuki Maze",
      productVersion: "1.02",
      devicePixelRatio: 1,
      matchWebGLToCanvasSize: true,
    });
  }

  startApp();
</script>
</body>
</html>
