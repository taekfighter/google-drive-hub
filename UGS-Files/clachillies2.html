 <script type="module" crossorigin="anonymous">
  let is_mobile = /Mobi/i.test(window.navigator.userAgent);
  if (is_mobile) {
    function scrollToSubject() {
      try { window.scrollTo({ top: 100, left: 0, behavior: 'smooth' }); } catch (e) {}
    }
    scrollToSubject();
    window.addEventListener("orientationchange", function() {
      setTimeout(scrollToSubject, 100);
    });
  } else {
    document.getElementById('canvas').focus();
  }
  document.getElementById('canvas').addEventListener("keydown", function(ev) {
    ev.preventDefault(); ev.stopPropagation();
  });
  document.getElementById('canvas').addEventListener("click", function() {
    document.getElementById('canvas').focus();
  });
  document.addEventListener("mousedown", (function() {
    const canvasElement = document.getElementById('canvas'); let focused = false;
    return function(ev) {
      if (ev.target == canvasElement) { if (!focused) { canvasElement.focus(); focused = true; } }
      else if (focused) { focused = false; }
      return true;
    }
  })());

(function ensureFullscreenCanvas(){
  const c = document.getElementById('canvas');
  const lock = () => {
    c.style.setProperty('position','fixed','important');
    c.style.setProperty('left','0','important');
    c.style.setProperty('top','0','important');
    c.style.setProperty('right','0','important');
    c.style.setProperty('bottom','0','important');
    c.style.setProperty('width','100vw','important');
    c.style.setProperty('height','100vh','important');
    c.style.setProperty('margin','0','important');
    c.style.setProperty('background','#000','important');
    document.documentElement.style.setProperty('background','#000','important');
    document.body.style.setProperty('background','#000','important');
  };
  lock();
  new MutationObserver(lock).observe(c, { attributes: true, attributeFilter: ['style','width','height','class'] });
  window.addEventListener('resize', lock);
})();

  import createWaflashModule from "https://cdn.jsdelivr.net/gh/jakwhegf/wflas@e3867f928f87b3fe8dc388a4a843f73aa50d1835/waflash.min.js?2022091801";

  const WAFLASH_BASE_URL = "https://cdn.jsdelivr.net/gh/jakwhegf/wflas@e3867f928f87b3fe8dc388a4a843f73aa50d1835/";

  const createWaflash = (swfUrl, opts) => {
    if (swfUrl || (swfUrl = ""), (opts = opts || {}).flashVars && (swfUrl += (swfUrl.includes("?") ? "&" : "?") + opts.flashVars)) return;

    let a = {
      arguments: [swfUrl, "0", opts.gpu ? "webgl" : "default", opts.enableFilters === true ? "0" : "1"],
      options: opts,
      preRun: [],
      postRun: [],
      locateFile: (filename, base) => WAFLASH_BASE_URL + filename + "?2022091801",
      print(msg) { console.log(msg); },
      printErr(msg) { console.error(msg); },

      canvas: (function() {
        const c = document.getElementById("canvas");
        c.addEventListener("webglcontextlost", function (ev) {
          console.warn("WebGL context lost. Reload the page to continue.");
          ev.preventDefault();
        }, false);
        return c;
      })(),

      statusElement: document.getElementById("waflashStatus"),

      setStatus: (msg) => {
        if (!msg) return;

        if (/^Downloading data\.{3} \((\d+)\/(\d+)\)/.test(msg)) {
          const m = msg.match(/^Downloading data\.{3} \((\d+)\/(\d+)\)/);
          const cur = parseInt(m[1], 10), all = parseInt(m[2], 10);
          const pct = Math.max(0, Math.min(100, Math.floor(cur / all * 100)));
          a.statusElement.innerHTML = `Downloading player... ${pct}%`;
          a.showStatus();
          return;
        }

        if (msg.startsWith("Loading SWF")) {
          a.statusElement.innerHTML = `
            <div>Loading SWF...</div>
            <div class="waflash-loader"><div class="bar"></div></div>
            <div class="waflash-caption">Loading game file, please wait...</div>
          `;
          a.showStatus();
          return;
        }

        a.statusElement.textContent = msg;
        a.showStatus();
      },

      showStatus() { a.statusElement.style.display = "block"; },
      hideStatus() { a.statusElement.style.display = "none"; },
      unload() {},

      WAFLASH: {
        hal: {
          url_transformRequestUrl(originalUrl) {
            const map = (opts && opts.resourceMap) || null;

            if (Array.isArray(map)) {
              for (let [pattern, target] of map) {
                if (pattern instanceof RegExp) {
                  if (pattern.test(originalUrl)) return target === null ? null : originalUrl.replace(pattern, target);
                } else if (typeof pattern === "string") {
                  const kind = pattern.charAt(0);
                  if (kind === "=") {
                    if (pattern.slice(1) === originalUrl) return target;
                  } else if (kind === "~") {
                    const re = new RegExp(pattern.slice(1));
                    if (re.test(originalUrl)) return target === null ? null : originalUrl.replace(re, target);
                  } else {
                    let q = originalUrl.indexOf("?"), path = originalUrl, qs = "";
                    if (q >= 0) { path = originalUrl.substring(0, q); qs = "&" + originalUrl.substr(q + 1); }
                    if (pattern === path) return target === null ? null : (target + qs);
                  }
                }
              }
            }

            if (originalUrl.startsWith("http://") &&
                /(\.github\.io|\.waflash\.io|waflash\.cdn\.ntruss\.com|\.archive\.org)/.test(originalUrl)) {
              return originalUrl.replace("http://", "https://");
            }
            return originalUrl;
          }
        }
      }
    };

    window.waflash = a;

    a.setStatus("Prepairing...");
    createWaflashModule(a).then(() => {
      console.log("WAFLASH> Waflash module created!");
      // a.hideStatus();
    });
  };

  const destroyWaflash = () => {
    console.log("WAFLASH> Waflash component will unmount!");
    waflash.unload();
    waflash = null;
    window.waflash = null;
  };

  createWaflash(gameConfig.swfUrl, window.wafOptions || {});
</script>
