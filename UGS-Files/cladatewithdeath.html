<!doctype html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>A Date with Death</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

    html { background: #444; font-family: sans-serif; }
    body, html { overscroll-behavior: none; margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; }
    #canvas, #overlayDiv { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0 none; }
    #canvas { background: #000; }
    .visible { visibility: visible; opacity: 1.0; transition: opacity .1s linear; }
    .hidden { visibility: hidden; opacity: 0; transition: visibility 0s .25s, opacity .25s linear; }
    
    #statusDiv { 
        background: rgba(0, 0, 0, 0.85); 
        width: 60%; margin: auto; min-width: 340px; padding: 20px; 
        position: absolute; top: 25%; left: 0; right: 0; 
        border-radius: 10px; color: #eee; text-align: center; z-index: 100;
    }
    #statusProgress { width: 100%; height: 25px; margin-top: 10px; }
    #presplash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 50; }

    /* Required by Ren'Py scripts to avoid null reference errors */
    #inputDiv { background: rgba(0,0,0,0.75); width: 65%; padding: 20px; position: absolute; top: 20%; left:0; right:0; margin:auto; border-radius: 10px; z-index: 120; }
    #inputText { width: 100%; font-size: 150%; background: #222; color: #fff; padding: 5px; }
    #ContextContainer { position: absolute; left: 10px; top: 10px; color: white; z-index: 110; }
    #ContextButton { font-size: 30px; cursor: pointer; opacity: 0.7; user-select: none; }
    #ContextMenu a { display: block; padding: 10px; background: #444; color: #eee; text-decoration: none; border: 1px solid #555; margin-top: 5px; border-radius: 5px; }
  </style>
</head>

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="overlayDiv"></div>

  
  <img id="presplash" src="https://cdn.jsdelivr.net/gh/shayderrr/newports@77c469d583759817a3cdf97330fd1545f0a46f24/ADatewithDeath-2.4-web/web-presplash.jpg">

  
  <div id="statusDiv" class="visible">
    <div id="statusTextDiv">Connecting to CDN...</div>
    <progress id="statusProgress" value="0" max="100"></progress>
  </div>


  <div id="inputDiv" class="hidden">
    <form id="inputForm"><div id="inputPrompt"></div><input id="inputText" type="text"></form>
  </div>

  <div id="ContextContainer">
    <a id="ContextButton">&#8801;</a>
    <div id="ContextMenu" style="display: none;">
        <a href="javascript:onSavegamesExport();">Export Saves</a>
        <a href="https://www.renpy.org/" target="_blank">Powered by Ren'Py</a>
    </div>
  </div>

  <script>
    
    const GITHUB_BASE = "https://cdn.jsdelivr.net/gh/shayderrr/newports@77c469d583759817a3cdf97330fd1545f0a46f24/ADatewithDeath-2.4-web/";
    
    const FILE_CONFIG = {
        zip: { base: "game.zip.part", count: 100, pad: 3 }, 
        wasm: { base: "renpy.wasm.part", count: 2, pad: 0 }
    };


    window.isFullscreen = () => !!(document.fullscreenElement || document.webkitFullscreenElement);

    async function fetchAndMerge(config, label) {
        const chunks = [];
        const progressElement = document.getElementById('statusProgress');
        const textElement = document.getElementById('statusTextDiv');

        for (let i = 1; i <= config.count; i++) {
            const suffix = config.pad > 0 ? i.toString().padStart(config.pad, '0') : i.toString();
            const url = GITHUB_BASE + config.base + suffix;
            
            textElement.innerText = `Downloading ${label} (${i}/${config.count})...`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error(`CDN Error: Failed to fetch ${url}`);
            
            chunks.push(await response.arrayBuffer());
            
            // Global progress calculation
            const totalSteps = FILE_CONFIG.zip.count + FILE_CONFIG.wasm.count;
            const currentStep = (label === 'Engine' ? i : FILE_CONFIG.wasm.count + i);
            progressElement.value = (currentStep / totalSteps) * 100;
        }
        return new Blob(chunks);
    }

    async function bootstrap() {
        try {
  
            const wasmBlob = await fetchAndMerge(FILE_CONFIG.wasm, "Engine");
            const wasmArrayBuffer = await wasmBlob.arrayBuffer();
            
   
            const zipBlob = await fetchAndMerge(FILE_CONFIG.zip, "Game Files");
            const zipURL = URL.createObjectURL(zipBlob);

         
            window.gameZipURL = zipURL;
            window.Module = {
                wasmBinary: wasmArrayBuffer,
                print: console.log,
                printErr: console.error,
                locateFile: (path) => GITHUB_BASE + path,
                setStatus: (text) => {
                    if (text) document.getElementById('statusTextDiv').innerText = text;
                    else {
                        
                        document.getElementById('statusDiv').classList.add('hidden');
                        document.getElementById('presplash').classList.add('hidden');
                    }
                }
            };

          
            console.log("Loading core scripts...");
            await loadScript(GITHUB_BASE + "renpy-pre.js");
            await loadScript(GITHUB_BASE + "renpy.js");

        } catch (e) {
            document.getElementById('statusTextDiv').style.color = "#ff6666";
            document.getElementById('statusTextDiv').innerText = "FATAL ERROR: " + e.message;
            console.error(e);
        }
    }

    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload = resolve;
            s.onerror = (err) => reject(new Error("Failed to load engine script: " + src));
            document.body.appendChild(s);
        });
    }


    bootstrap();


    document.getElementById('ContextButton').addEventListener('click', () => {
        const menu = document.getElementById('ContextMenu');
        menu.style.display = (menu.style.display === 'none') ? 'block' : 'none';
    });
  </script>
</body>
</html>
