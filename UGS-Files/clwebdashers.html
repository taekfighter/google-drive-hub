<base id="baseTag" href="https://web-dashers.github.io/">
<script>
    launch();

    function launch() {
        const baseHref = document.getElementById("baseTag").href;

        try {
            fetch("https://cdn.jsdelivr.net/gh/web-dashers/web-dashers.github.io@main/index.html?t=" + Date.now())
                .then(res => res.text())
                .then(html => {
                    // Inject <base> directly into <head> BEFORE parsing
                    if (html.includes("<head>")) {
                        html = html.replace(
                            "<head>",
                            `<head><base href="${baseHref}">`
                        );
                    } else {
                        // fallback if no <head>
                        html = `<base href="${baseHref}">` + html;
                    }

                    // Replace document
                    document.open();
                    document.write(html);
                    document.close();
                });
        } catch (error) {
            console.error("error:", error);
        }
    }
</script>
