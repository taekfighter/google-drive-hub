<li>
  <a href="javascript:(async()=>{
           const res = await fetch('https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/AASINGLEFILE.html');
           const text = await res.text();
           const parser = new DOMParser();
           const doc = parser.parseFromString(text, 'text/html');
           const html = window.parent.document;
           html.documentElement.innerHTML = doc.documentElement.innerHTML;
           doc.querySelectorAll('script').forEach(s => {
           const ns = html.createElement('script');
           if (s.src) ns.src = s.src;
           else ns.textContent = s.textContent;
           html.body.appendChild(ns);
           });
           })()">Website</a>
</li>
