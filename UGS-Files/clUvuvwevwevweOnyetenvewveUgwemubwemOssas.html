 <!DOCTYPE html>


<!-- Ultimate Game Stash file--> 
<!-- For the regularly updating doc go to https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/ -->




<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/bubbls/ports@main/UvuvwevwevweOnyetenvewveUgwemubwemOssas/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | UvuvwevwevweOnyetenvewv</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">UvuvwevwevweOnyetenvewv</div>
      </div>
    </div>
    <script src="merge-parts.js"></script>

    <script>
      var container        = document.querySelector("#unity-container");
      var canvas           = document.querySelector("#unity-canvas");
      var loadingBar       = document.querySelector("#unity-loading-bar");
      var progressBarFull  = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner    = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl  = "Build";
      var loaderUrl = buildUrl + "/fatty.loader.js";

      var config = {
        dataUrl:            buildUrl + "/fatty.data",        
        frameworkUrl:       buildUrl + "/fatty.framework.js", 
        codeUrl:            buildUrl + "/fatty.wasm",         
        streamingAssetsUrl: "StreamingAssets",
        companyName:        "Zakaria",
        productName:        "UvuvwevwevweOnyetenvewv",
        productVersion:     "1.0.1",
        showBanner:         unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
        unityShowBanner('WebGL builds are not supported on mobile devices.');
      } else {
        canvas.style.width  = "100vw";
        canvas.style.height = "105vh";
      }

      loadingBar.style.display = "block";

      var _blobUrls = null;

      (async () => {
        try {
          _blobUrls = await patchUnityConfigWithMergedParts(
            config,
            buildUrl,
            (overallProgress) => {
              progressBarFull.style.width = (overallProgress * 50) + "%";
            }
          );
        } catch (err) {
          unityShowBanner("Failed to load game files: " + err.message, "error");
          console.error("[merge-parts] Error:", err);
          return;
        }

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = (50 + progress * 50) + "%";
          })
          .then((unityInstance) => {
            loadingBar.style.display = "none";

            fullscreenButton.onclick = () => {
              unityInstance.SetFullscreen(1);
            };
            if (_blobUrls) {
              URL.revokeObjectURL(_blobUrls.dataBlob);
              URL.revokeObjectURL(_blobUrls.wasmBlob);
              console.log("[merge-parts] Blob URLs revoked – memory freed.");
            }
          })
          .catch((message) => {
            alert(message);
          });
        };
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
