    <style>
      @-webkit-keyframes rotation {
        from { -webkit-transform: rotate(0deg); }
        to   { -webkit-transform: rotate(360deg); }
      }
      @-moz-keyframes rotation {
        from { -moz-transform: rotate(0deg); }
        to   { -moz-transform: rotate(360deg); }
      }
      @-o-keyframes rotation {
        from { -o-transform: rotate(0deg); }
        to   { -o-transform: rotate(360deg); }
      }
      @keyframes rotation {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }

      html { background: #FFFFFF; }

      body {
        font-family: arial;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        min-height: fill-available;
        min-height: 100svh;
        min-width: 100vw;
        background: radial-gradient(56.63% 56.63% at 50% 43.37%, transparent 0%, transparent 100%);
        background-color: black;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        place-items: center;
      }

      body.scrollingDisabled { overflow: hidden; }

      .emscripten { padding-right: 0; display: block; }
      div.emscripten { text-align: center; font-family: "Lucida Console", Monaco, monospace; }

      canvas.emscripten {
        display: none;
        background-color: black;
        position: relative;
        transition: opacity 5s ease-in;
        -webkit-transition: opacity 5s ease-in;
        opacity: 0;
        filter: blur(0) grayscale(0);
        margin-top: auto;
        margin-bottom: auto;
        image-rendering: optimizeSpeed;
        image-rendering: -moz-crisp-edges;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: -o-crisp-edges;
        image-rendering: pixelated;
        -ms-interpolation-mode: nearest-neighbor;
      }

      canvas.active {
        animation-name: fadeIn;
        animation-duration: 2s;
        opacity: 1;
      }
      canvas.paused {
        animation-name: blur;
        animation-duration: 0.5s;
        filter: blur(2px) grayscale(1);
      }
      canvas.unpaused { animation-name: none; }
      canvas.animatedSizeTransitions { transition: width 0.3s ease, height 0.3s ease; }

      @keyframes fadeIn {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes blur {
        0%   { filter: blur(0) grayscale(0); }
        100% { filter: blur(2px) grayscale(1); }

      .spinner {
        height: 30px;
        width: 30px;
        -webkit-animation: rotation 0.8s linear infinite;
        -moz-animation:    rotation 0.8s linear infinite;
        -o-animation:      rotation 0.8s linear infinite;

      div.loading {

    <script async
      data-ad-client="ca-pub-123"

    <!-- Tick worker for multiplayer -->
    <script id="tick-worker" type="javascript/worker">
      let running = false;
      let stop_called = false;
      let intervalMs = 16;

      onmessage = (e) => {
        if (e.data.run) {
          intervalMs = Math.floor(1000 / e.data.fps);
          if (!running) {
            running = true;
            setTimeout(tick, intervalMs);
          }
        } else {
          stop_called = true;
        }
      };

      const tick = () => {
        if (stop_called) { stop_called = false; running = false; return; }
        const start = new Date().getTime();
        postMessage('');
        const end = new Date().getTime();
        let next_update = start + intervalMs - end;
        next_update = Math.max(next_update, 0);
        setTimeout(tick, next_update);
      };
    </script>

    <script type="text/javascript">
      // ── Tick worker setup ──────────────────────────────────────────
      const tickBlob = new Blob([document.querySelector('#tick-worker').textContent]);
      const tickWorker = new Worker(window.URL.createObjectURL(tickBlob));

      tickWorker.onmessage = function () {
        GM_tick(performance.now());
      };

      const isMultiplayer = function () {
        if (typeof GM_is_multiplayer !== 'function') return false;
        return GM_is_multiplayer() !== 0;
      };

      document.addEventListener('visibilitychange', function () {
        if (!isMultiplayer()) return;
        if (document.visibilityState === 'hidden') {
          tickWorker.postMessage({ run: true, fps: 60 });
        } else {
          tickWorker.postMessage({ run: false });
        }
      });
    </script>

    <script type="text/javascript">
      // ── DOM refs ───────────────────────────────────────────────────
      const CHANGE_ASPECT_RATIO = true;

      var bodyElement             = document.getElementsByTagName("body")[0];
      var statusElement           = document.getElementById("status");
      var progressElement         = document.getElementById("progress");
      var spinnerElement          = document.getElementById("spinner");
      var canvasElement           = document.getElementById("canvas");
      var outputElement           = document.getElementById("output");
      var outputContainerElement  = document.getElementById("output-container");
      var pauseMenu               = document.getElementById("pauseMenuContainer");
      var resumeButton            = document.getElementById("resumeButton");
      var quitButton              = document.getElementById("quitButton");
      var loadingText             = document.getElementById("loading-text");

      canvasElement.addEventListener("click", function () { canvasElement.focus(); });

      const messageContainerElement = document.getElementById("message-container");
      const messagesElement         = document.getElementById("messages");
      let rollbackMessages = [];
      let clearRollbackMessagesTimeoutId = -1;

      const showRollbackMessage = function (message) {
        rollbackMessages.push(message);
        messagesElement.innerHTML = rollbackMessages.map(m => "<p>" + m + "</p>").join("");
        messageContainerElement.style.display = 'block';
        if (clearRollbackMessagesTimeoutId === -1) clearTimeout(clearRollbackMessagesTimeoutId);
        clearRollbackMessagesTimeoutId = setTimeout(clearRollbackMessages, 5000);
      };

      const clearRollbackMessages = function () {
        clearRollbackMessagesTimeoutId = -1;
        rollbackMessages = [];
        messageContainerElement.style.display = 'none';
      };

      // ── Aspect ratio ───────────────────────────────────────────────
      var startingHeight, startingWidth, startingAspect;

      function ensureAspectRatio() {
        if (!canvasElement || !CHANGE_ASPECT_RATIO) return;
        if (startingHeight === undefined && startingWidth === undefined) return;

        canvasElement.classList.add("active");

        const maxWidth  = window.innerWidth;
        const maxHeight = window.innerHeight;
        var newHeight, newWidth;

        var heightQuotient = startingHeight / maxHeight;
        var widthQuotient  = startingWidth  / maxWidth;

        if (heightQuotient > widthQuotient) {
          newHeight = maxHeight;
          newWidth  = newHeight * startingAspect;
        } else {
          newWidth  = maxWidth;
          newHeight = newWidth / startingAspect;
        }

        canvasElement.style.height = newHeight + "px";
        canvasElement.style.width  = newWidth  + "px";
      }

      // ── Module ─────────────────────────────────────────────────────
      var Module = {
        preRun: [],
        postRun: [],
        print: (function () {
          var element = document.getElementById("output");
          if (element) element.value = "";
          return function (text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
            console.log(text);
            if (text === "Entering main loop.") ensureAspectRatio();
            if (element) {
              element.value += text + "\n";
              element.scrollTop = element.scrollHeight;
            }
          };
        })(),
        printErr: function (text) {
          if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(" ");
          console.error(text);
        },
        canvas: (function () { return document.getElementById("canvas"); })(),
        setStatus: function (text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: "" };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return;
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value  = parseInt(m[2]) * 100;
            progressElement.max    = parseInt(m[4]) * 100;
            progressElement.hidden = false;
            spinnerElement.hidden  = false;
          } else {
            progressElement.value  = null;
            progressElement.max    = null;
            progressElement.hidden = true;
            if (!text) {
              spinnerElement.style.display  = "none";
              canvasElement.style.display   = "block";
            }
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function (left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(
            left
              ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")"
              : "All downloads complete."
          );
        },
      };

      Module.setStatus("Downloading...");

      window.onerror = function (event) {
        Module.setStatus("Exception thrown, see JavaScript console");
        spinnerElement.style.display = "none";
        Module.setStatus = function (text) {
          if (text) Module.printErr("[post-exception status] " + text);
        };
      };

      if (typeof window === "object") {
        Module['arguments'] = window.location.search.substr(1).trim().split('&');
        if (!Module['arguments'][0]) Module['arguments'] = [];
      }

      // ── game.unx loader (5 parts, with live progress display) ──────
      let totalBytes  = 0;  // will accumulate as parts load
      let loadedBytes = 0;

      // Rough expected total — update if you know it precisely
      // (Set to 0 to show "? MB" until complete; or put your real byte count here)
      const EXPECTED_TOTAL_BYTES = 0;

      function formatSize(bytes) {
        if (bytes > 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
        if (bytes > 1024 * 1024)        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
        if (bytes > 1024)               return (bytes / 1024).toFixed(2) + " KB";
        return bytes + " B";
      }

      function updateLoadingText() {
        const doneText  = formatSize(loadedBytes);
        const totalText = EXPECTED_TOTAL_BYTES > 0 ? formatSize(EXPECTED_TOTAL_BYTES) : "?";
        const percent   = EXPECTED_TOTAL_BYTES > 0
          ? ((loadedBytes / EXPECTED_TOTAL_BYTES) * 100).toFixed(1)
          : "?";
        if (loadingText) {
          loadingText.textContent = `LOADING... ${doneText} / ${totalText} (${percent}%)`;
        }
      }

      async function fetchPartWithProgress(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Failed to fetch ${url}: ${response.status}`);
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          received    += value.length;
          loadedBytes += value.length;
          chunks.push(value);
          updateLoadingText();
        }
        const buffer = new Uint8Array(received);
        let offset = 0;
        for (const chunk of chunks) { buffer.set(chunk, offset); offset += chunk.length; }
        return buffer.buffer;
      }

      async function loadAndCombineGameParts() {
        const NUM_PARTS = 5;
        const buffers   = [];

        for (let i = 1; i <= NUM_PARTS; i++) {
          const partName = `game.unx.part${i}`;
          console.log(`Fetching ${partName}...`);
          const buf = await fetchPartWithProgress(partName);
          buffers.push(buf);
        }

        const totalLength = buffers.reduce((sum, b) => sum + b.byteLength, 0);
        const combined    = new Uint8Array(totalLength);
        let offset = 0;
        for (const buf of buffers) {
          combined.set(new Uint8Array(buf), offset);
          offset += buf.byteLength;
        }
        console.log(`Combined 5 parts into game.unx (${totalLength} bytes)`);
        return combined.buffer;
      }

      // ── Wire up fetch/XHR intercepts then boot the runner ─────────
      (async () => {
        try {
          const combinedBuffer = await loadAndCombineGameParts();
          const gameUrl = URL.createObjectURL(new Blob([combinedBuffer]));
          window.gameUnxUrl = gameUrl;

          // Intercept fetch
          const originalFetch = window.fetch;
          window.fetch = async function (...args) {
            let [url, options] = args;
            if (typeof url === 'string' && url.includes("game.unx")) {
              url = window.gameUnxUrl;
            } else if (url instanceof Request && url.url.includes("game.unx")) {
              url = new Request(window.gameUnxUrl, url);
            }
            return originalFetch.call(this, url, options);
          };

          // Intercept XHR
          const originalOpen = XMLHttpRequest.prototype.open;
          XMLHttpRequest.prototype.open = function (method, url, ...rest) {
            if (typeof url === 'string' && url.includes("game.unx")) {
              url = window.gameUnxUrl;
            }
            return originalOpen.call(this, method, url, ...rest);
          };

          // Remove loading text, inject runner scripts
          if (loadingText) loadingText.remove();

          const runnerScript = document.createElement("script");
          runnerScript.src   = "runner.js";
          runnerScript.async = true;
          runnerScript.type  = "text/javascript";
          document.body.appendChild(runnerScript);

        } catch (err) {
          console.error("Failed to load game data:", err);
          if (loadingText) loadingText.textContent = "ERROR: Failed to load game files. Try clearing site cache.";
        }
      })();

      // ── GX / GameMaker helpers (required by runner.js) ────────────
      var g_pWadLoadCallback = undefined;
      function setWadLoadCallback(_cb) { g_pWadLoadCallback = _cb; }

      var g_pAddAsyncMethod = -1;
      function setAddAsyncMethod(asyncMethod) { g_pAddAsyncMethod = asyncMethod; }

      var g_pJSExceptionHandler = undefined;
      function setJSExceptionHandler(handler) {
        if (typeof handler === "function") g_pJSExceptionHandler = handler;
      }
      function hasJSExceptionHandler() {
        return g_pJSExceptionHandler !== undefined && typeof g_pJSExceptionHandler === "function";
      }
      function doJSExceptionHandler(exceptionJSON) {
        if (typeof g_pJSExceptionHandler === "function") {
          g_pJSExceptionHandler(JSON.parse(exceptionJSON));
        }
      }

      function manifestFiles() {
        return ["runner.data", "runner.js", "runner.wasm", "audio-worklet.js"].join(";");
      }

      function onFirstFrameRendered() { /* intentionally blank */ }

      function onGameSetWindowSize(width, height) {
        console.log("Window size set to width: " + width + ", height: " + height);
        startingHeight = height;
        startingWidth  = width;
        startingAspect = startingWidth / startingHeight;
        ensureAspectRatio();
      }

      function triggerAd(adId, _cb_before, _cb_after, _cb_dismissed, _cb_viewed, _cb_done) {
        var pRValueCopy     = triggerAdPrefix(_cb_before, _cb_after, _cb_dismissed, _cb_viewed, _cb_done);
        var pCallbackBefore    = pRValueCopy + (0 * 16);
        var pCallbackAfter     = pRValueCopy + (1 * 16);
        var pCallbackDismissed = pRValueCopy + (2 * 16);
        var pCallbackViewed    = pRValueCopy + (3 * 16);
        var pCallbackDone      = pRValueCopy + (4 * 16);

        adBreak({
          "type": "reward",
          "name": adId,
          "beforeAd":     () => { console.log("beforeAd");    doGMLCallback(pCallbackBefore,    { id: adId }); },
          "afterAd":      () => { console.log("afterAd");     doGMLCallback(pCallbackAfter,     { id: adId }); },
          "beforeReward": (showAdFn) => { console.log("beforeReward"); showAdFn(); },
          "adDismissed":  () => { console.log("adDismissed"); doGMLCallback(pCallbackDismissed, { id: adId }); },
          "adViewed":     () => { console.log("adViewed");    doGMLCallback(pCallbackViewed,    { id: adId }); },
          "adBreakDone":  (info) => {
            console.log("adBreakDone");
            doGMLCallback(pCallbackDone, { id: adId });
            triggerAdPostfix(pRValueCopy);
          },
        });
      }

      function triggerPayment(itemId, _cb_complete) {
        var pRValueCopy = triggerPaymentPrefix(_cb_complete);
        setTimeout(() => {
          console.log("triggerPayment");
          doGMLCallback(pRValueCopy, { id: itemId });
        }, 1000);
        triggerPaymentPostfix();
      }

      // ── Pause / Resume ─────────────────────────────────────────────
      function pause() {
        if (!canvasElement.classList.contains("active")) return;
        GM_pause();
        pauseMenu.hidden = false;
        canvasElement.classList.add("paused");
      }

      function resume() {
        GM_unpause();
        pauseMenu.hidden = true;
        canvasElement.classList.remove("paused");
        canvasElement.classList.add("unpaused");
        enterFullscreenIfSupported();
        lockOrientationIfSupported();
      }

      function quitIfSupported() {
        if (window.oprt && window.oprt.closeTab) {
          window.oprt.closeTab();
        } else if (window.chrome && window.chrome.runtime && window.chrome.runtime.sendMessage) {
          window.chrome.runtime.sendMessage('mpojjmidmnpcpopbebmecmjdkdbgdeke', { command: 'closeTab' });
        }
      }

      function enterFullscreenIfSupported() {
        if (!window.oprt || !window.oprt.enterFullscreen) return;
        window.oprt.enterFullscreen();
        let vs = GM_get_view_status(); vs.fullscreen = true; GM_set_view_status(vs);
      }

      function lockOrientationIfSupported() {
        if (!window.oprt || !window.oprt.lockPortraitOrientation || !window.oprt.lockLandscapeOrientation) return;
        let vs = GM_get_view_status();
        if (vs.landscape === true  && vs.portrait === false) window.oprt.lockPortraitOrientation();
        if (vs.landscape === false && vs.portrait === true)  window.oprt.lockPortraitOrientation();
      }

      // ── Resize observer ────────────────────────────────────────────
      const resizeObserver = new ResizeObserver(() => {
        window.requestAnimationFrame(ensureAspectRatio);
        setTimeout(() => window.requestAnimationFrame(ensureAspectRatio), 100);
      });
      resizeObserver.observe(document.body);

      // ── Mobile tweaks ──────────────────────────────────────────────
      if (/Android|iPhone|iPod/i.test(navigator.userAgent)) {
        bodyElement.className = "scrollingDisabled";
        canvasElement.classList.add("animatedSizeTransitions");
        outputContainerElement.hidden = true;
      }

      document.addEventListener("visibilitychange", (event) => {
        if (document.visibilityState !== "visible") {
          pause();
        } else if (isMultiplayer()) {
          resume();
        }
      });

      window.addEventListener("load", (event) => {
        if (
          (!window.oprt || !window.oprt.enterFullscreen) &&
          (!window.chrome || !window.chrome.runtime || !window.chrome.runtime.sendMessage)
        ) {
          quitButton.hidden = true;
        }
      });

      setWadLoadCallback(() => {
        enterFullscreenIfSupported();
        lockOrientationIfSupported();
      });
    </script>

  </body>
</html>
