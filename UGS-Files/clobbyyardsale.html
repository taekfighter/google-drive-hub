<!DOCTYPE html>
<html lang="en-us">
<head>
   
    <base href="https://cdn.jsdelivr.net/gh/shayderrr/newports@2d567d17562e37987e85e8b4e716af9127f6f5d3/92245cd524f44468bffc0b790f855e80/">
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>ObbyYardSale</title>
    <link rel="stylesheet" href="TemplateData/style.css">
</head>
<body>
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=960 height=600></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <!-- 1. Load the Unity Engine script (your unityApp.js) -->
    <script src="unityApp.js"></script>

    <script>
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");

        // These paths are relative to your <base href>
        const part1Url = "Build/ObbyYardSale[9]-mirraSDK[5.0.18].data.unityweb.part1";
        const part2Url = "Build/ObbyYardSale[9]-mirraSDK[5.0.18].data.unityweb.part2";

        async function startUnity() {
            try {
                console.log("Downloading and merging split data files...");
                
                // Fetch both parts simultaneously
                const [resp1, resp2] = await Promise.all([
                    fetch(part1Url),
                    fetch(part2Url)
                ]);

                if (!resp1.ok || !resp2.ok) {
                    throw new Error("One of the data parts failed to download (404)");
                }

                // Convert to Blobs
                const blob1 = await resp1.blob();
                const blob2 = await resp2.blob();

                // MERGE: Combine them into one single Blob
                const combinedBlob = new Blob([blob1, blob2], { type: "application/octet-stream" });
                
                // Create a temporary local URL for this merged file
                const mergedDataUrl = URL.createObjectURL(combinedBlob);

                // Define the Unity configuration
                var config = {
                    dataUrl: mergedDataUrl, // <--- This now points to our merged Blob in memory
                    frameworkUrl: "Build/ObbyYardSale[9]-mirraSDK[5.0.18].framework.js.unityweb",
                    codeUrl: "Build/ObbyYardSale[9]-mirraSDK[5.0.18].wasm.unityweb",
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "Unity",
                    productName: "ObbyYardSale",
                    productVersion: "1.0",
                };

                // Start the Unity instance
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = 100 * progress + "%";
                }).then((unityInstance) => {
                    loadingBar.style.display = "none";
                    
                    // Optional: Clean up memory after 10 seconds
                    setTimeout(() => URL.revokeObjectURL(mergedDataUrl), 10000);
                }).catch((message) => {
                    console.error("Unity Load Error:", message);
                });

            } catch (err) {
                console.error("Manual Merge Error:", err);
                alert("Failed to merge split files. Check console for details.");
            }
        }

        // Execute the merge and start process
        startUnity();
    </script>
</body>
</html>
