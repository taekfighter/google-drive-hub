<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | hollow-knight-reverso</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/shayderrr/horntaleport@main/TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">hollow-knight-reverso</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else { if (type == 'warning') div.style = 'background: yellow; padding: 10px;'; setTimeout(() => { warningBanner.removeChild(div); }, 5000); }
      }

      var config = {
        dataUrl: "", frameworkUrl: "https://cdn.jsdelivr.net/gh/shayderrr/horntaleport@main/Build/horntale-web-update.framework.js",
        codeUrl: "", showBanner: unityShowBanner, companyName: "DefaultCompany", productName: "hollow-knight-reverso", productVersion: "1.0",
      };

      async function getMergedBlobUrl(parts) {
        const responses = await Promise.all(parts.map(url => fetch(url).then(r => r.blob())));
        return URL.createObjectURL(new Blob(responses));
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else { canvas.style.width = "960px"; canvas.style.height = "600px"; }

      document.querySelector("#unity-loading-bar").style.display = "block";
      var script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/gh/shayderrr/horntaleport@main/Build/horntale-web-update.loader.js";
      script.onload = async () => {
        config.dataUrl = await getMergedBlobUrl([
          "https://cdn.jsdelivr.net/gh/shayderrr/horntaleport@main/Build/horntale-web-update.data.part1",
          "https://cdn.jsdelivr.net/gh/shayderrr/horntaleport@main/Build/horntale-web-update.data.part2"
        ]);
        config.codeUrl = await getMergedBlobUrl([
          "https://cdn.jsdelivr.net/gh/shayderrr/horntaleport@main/Build/horntale-web-update.wasm.part1",
          "https://cdn.jsdelivr.net/gh/shayderrr/horntaleport@main/Build/horntale-web-update.wasm.part2",
          "https://cdn.jsdelivr.net/gh/shayderrr/horntaleport@main/Build/horntale-web-update.wasm.part3"
        ]);
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => unityInstance.SetFullscreen(1);
        }).catch(alert);
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
