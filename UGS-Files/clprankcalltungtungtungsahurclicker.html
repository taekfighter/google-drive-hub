<script>(function () {
  const OLD =
    "https://cdn.jsdelivr.net/gh/faralong/all@main/tungclick/assets/main/index.js";

  const NEW =
    "https://cdn.jsdelivr.net/gh/faralong/all@main/tungclick/assets/main/index5.js";

  function swapIfMatch(script) {
    if (!script || script.tagName !== "SCRIPT") return;

    const src = script.src || script.getAttribute("src");
    if (!src) return;

    // Normalize comparison (important!)
    if (src.includes("index.js") && src.includes("tungclick/assets/main")) {
      script.src = NEW;
      console.log("[Hooked] Script swapped → index2.js");
    }
  }

  // Hook setAttribute
  const origSetAttr = Element.prototype.setAttribute;
  Element.prototype.setAttribute = function (name, value) {
    if (this.tagName === "SCRIPT" && name === "src") {
      if (value.includes("index.js")) {
        value = NEW;
        console.log("[Hooked:setAttribute]");
      }
    }
    return origSetAttr.call(this, name, value);
  };

  // Hook appendChild (MOST IMPORTANT)
  const origAppend = Element.prototype.appendChild;
  Element.prototype.appendChild = function (node) {
    swapIfMatch(node);
    return origAppend.call(this, node);
  };

  // Hook insertBefore
  const origInsertBefore = Element.prototype.insertBefore;
  Element.prototype.insertBefore = function (node, ref) {
    swapIfMatch(node);
    return origInsertBefore.call(this, node, ref);
  };

  // Catch already existing scripts
  document.querySelectorAll("script[src]").forEach(swapIfMatch);

  // Fallback: observe DOM mutations
  new MutationObserver((mutations) => {
    for (const m of mutations) {
      for (const node of m.addedNodes) {
        swapIfMatch(node);
      }
    }
  }).observe(document.documentElement, {
    childList: true,
    subtree: true,
  });

  console.log("[Hook active] script interceptor running");
})();</script>
