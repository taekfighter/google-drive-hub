<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>Pokepasta Perdition - V. 1.5.1</title>
    <style>
        html, body, #canvas { margin: 0; padding: 0; border: 0; }
        body { color: white; background-color: black; overflow: hidden; touch-action: none; }
        #canvas { display: block; width: 100vw; height: 100vh; }
        #canvas:focus { outline: none; }
        #status { position: absolute; left: 0; right: 0; top: 0; bottom: 0; background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; font-family: sans-serif; }
        #status-progress { width: 50%; height: 20px; margin: 10px 0; }
        #status-notice { background-color: #5b3943; border-radius: 0.5rem; border: 1px solid #9b3943; color: #e0e0e0; padding: 1rem; margin-top: 10px; display: none; text-align: center; max-width: 80%; }
    </style>
</head>
<body>
    <canvas id="canvas">Your browser does not support the canvas tag.</canvas>

    <div id="status">
        <div id="status-text">Merging Parts from jsDelivr...</div>
        <progress id="status-progress" value="0" max="100"></progress>
        <div id="status-notice"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/wasm-com/Ports@main/Pokemon%20Perdition/Pokepasta%20Perdition%20-%20V.%201.5.1.js"></script>

    <script>
const BASE_URL = 'https://cdn.jsdelivr.net/gh/wasm-com/Ports@main/Pokemon%20Perdition/';
const FILE_NAME = 'Pokepasta Perdition - V. 1.5.1';


let assembledWasm = null;
let assembledPck = null;

async function assembleToBuffer(fileName, totalParts, zeroPad) {
    const parts = [];
    for (let i = 1; i <= totalParts; i++) {
        const partNum = zeroPad ? String(i).padStart(2, '0') : String(i);
        const url = `${BASE_URL}${encodeURIComponent(fileName)}.part${partNum}`;
        
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Fetch Failed: ${url}`);
        
        parts.push(new Uint8Array(await res.arrayBuffer()));
        document.getElementById('status-progress').value += (100 / 17);
    }
    let totalLength = parts.reduce((acc, val) => acc + val.length, 0);
    let combined = new Uint8Array(totalLength);
    let offset = 0;
    for (const part of parts) {
        combined.set(part, offset);
        offset += part.length;
    }
    return combined.buffer;
}

(function () {
    const statusOverlay = document.getElementById('status');
    const statusProgress = document.getElementById('status-progress');
    const statusNotice = document.getElementById('status-notice');
    const statusText = document.getElementById('status-text');

    function displayFailureNotice(err) {
        console.error(err);
        statusNotice.innerText = err instanceof Error ? err.message : String(err);
        statusNotice.style.display = 'block';
        statusText.innerText = "Error";
    }

    async function start() {
        try {
          
            statusText.innerText = "Downloading Engine (2 Parts)...";
            assembledWasm = await assembleToBuffer(`${FILE_NAME}.wasm`, 2, false);

            statusText.innerText = "Downloading Assets (15 Parts)...";
            assembledPck = await assembleToBuffer(`${FILE_NAME}.pck`, 15, true);

            statusText.innerText = "Initializing Engine...";

            const originalFetch = window.fetch;
            window.fetch = function() {
                const url = arguments[0];
                const urlString = typeof url === 'string' ? url : url.url;

                if (urlString.includes('.wasm')) {
                    console.log("Intercepted WASM request:", urlString);
                    return Promise.resolve(new Response(assembledWasm, { status: 200, headers: { 'Content-Type': 'application/wasm' } }));
                }
                if (urlString.includes('.pck')) {
                    console.log("Intercepted PCK request:", urlString);
                    return Promise.resolve(new Response(assembledPck, { status: 200, headers: { 'Content-Type': 'application/octet-stream' } }));
                }
                return originalFetch.apply(this, arguments);
            };

   
            const engine = new Engine({
                "args": [],
                "canvasResizePolicy": 2,
                "executable": `${FILE_NAME}`,
                "ensureCrossOriginIsolationHeaders": false,
                "focusCanvas": true
            });

            engine.startGame({
                'onProgress': function (current, total) {
                    if (total > 0) statusProgress.value = (current / total) * 100;
                },
            }).then(() => {
                statusOverlay.style.display = 'none';
            }, displayFailureNotice);

        } catch (e) {
            displayFailureNotice(e);
        }
    }

    if (!Engine.getMissingFeatures({ threads: false }).length) {
        start();
    } else {
        displayFailureNotice("Browser Incompatible.");
    }
}());
    </script>
</body>
</html>
